linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused

linters-settings:
  errcheck:
    # Ignore Close, Remove, and print functions in cleanup paths
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - (net.Listener).Close
      - (net.Conn).Close
      - (*net.UnixListener).Close
      - (*crypto/tls.Conn).Close
      - os.Remove
      - os.RemoveAll
      - fmt.Fprintf
      - fmt.Fprint
      - fmt.Fprintln
      - (net.Conn).SetDeadline
      - (*net/http.Server).Shutdown
      - (*google.golang.org/grpc.Server).GracefulStop
  staticcheck:
    checks:
      - "all"
      - "-QF*"
      - "-SA1019"

issues:
  # Don't enforce errcheck in test files
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
