name: Nightly Fuzz

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Fuzz time per target (e.g. 5m, 30m)"
        required: false
        default: "5m"

permissions:
  contents: read

concurrency:
  group: fuzz-nightly
  cancel-in-progress: false

jobs:
  fuzz:
    name: Deep Fuzz
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { pkg: "internal/agent", func: "FuzzSSHAgentProtocol" }
          - { pkg: "internal/config", func: "FuzzConfigParse" }
          - { pkg: "internal/pairing", func: "FuzzQRPayloadParse" }
          - { pkg: "internal/daemon", func: "FuzzControlRequestParse" }
          - { pkg: "internal/daemon", func: "FuzzControlResponseParse" }
          - { pkg: "internal/mtls", func: "FuzzCertPEMParse" }
          - { pkg: "internal/mtls", func: "FuzzCertFingerprint" }
          - { pkg: "gen/nixkey/v1", func: "FuzzProtoSignRequest" }
          - { pkg: "gen/nixkey/v1", func: "FuzzProtoListKeysResponse" }
          - { pkg: "gen/nixkey/v1", func: "FuzzProtoRoundTrip" }
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: nix-key
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Deep fuzz ${{ matrix.target.func }}
        env:
          FUZZTIME: ${{ github.event.inputs.fuzztime || '5m' }}
        run: |
          nix develop --command bash -c "
            set -euo pipefail
            echo \"=== Fuzzing ${{ matrix.target.pkg }}::${{ matrix.target.func }} for ${FUZZTIME} ===\"
            go test -fuzz='^${{ matrix.target.func }}\$' -fuzztime='${FUZZTIME}' -run='^\$' './${{ matrix.target.pkg }}'
          "

      - name: Save crash corpus
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target.func }}
          path: "**/testdata/fuzz/"
          if-no-files-found: ignore
